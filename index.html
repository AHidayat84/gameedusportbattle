<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduSport Battle - PJOK SMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --p1: #3b82f6;
            --p2: #ef4444;
            --p3: #f59e0b;
            --p4: #a855f7;
            --font-main: 'Outfit', sans-serif;
            --font-title: 'Bangers', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; }
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .icon-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 50%; width: 45px; height: 45px; 
            color: white; cursor: pointer; backdrop-filter: blur(10px); 
            transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; font-size: 1.1rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        #main-menu {
            position: fixed; inset: 0; z-index: 900;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-y: auto; padding: 40px 20px;
        }

        .menu-card { 
            background: rgba(255,255,255,0.03); padding: 40px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 500px; width: 100%; position: relative;
        }

        /* Avatar Profil dengan Glowing */
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--secondary);
            margin-bottom: 20px;
            box-shadow: 0 0 20px var(--secondary), 0 0 40px rgba(59, 130, 246, 0.3);
            object-fit: cover;
        }

        .title-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .side-title-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .game-title { 
            font-family: var(--font-title); font-size: 4rem; line-height: 0.9; text-align: left;
            background: linear-gradient(135deg, #fff 20%, var(--secondary) 50%, var(--primary) 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .menu-btn { padding: 15px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 1rem; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #e2e8f0; transform: translateY(-2px); }
        
        .mode-selector { display: flex; background: rgba(0,0,0,0.4); border-radius: 14px; padding: 5px; margin-bottom: 20px; }
        .mode-opt { flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 900; color: #94a3b8; }
        .mode-opt.active { background: #fff; color: #000; }

        #game-container { 
            position: fixed; inset: 0; display: none; width: 100%; height: 100%; 
        }
        
        #game-container.mode-solo { grid-template-columns: 1fr; }
        #game-container.mode-duel { grid-template-columns: 1fr 1fr; }
        #game-container.mode-squad { grid-template-columns: 1fr 1fr 1fr 1fr; }

        .player-area { position: relative; display: flex; flex-direction: column; overflow: hidden; background: #020617; border: 1px solid rgba(255,255,255,0.05); }
        .player-area.eliminated { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        .hud { padding: 10px; display: flex; flex-direction: column; gap: 4px; font-size: 0.75rem; font-weight: 900; background: rgba(0,0,0,0.2); text-align: center; }
        .timer-track { height: 5px; background: rgba(255,255,255,0.1); width: 100%; }
        .timer-fill { height: 100%; background: var(--secondary); width: 100%; transition: width 0.1s linear; }

        .game-content { flex: 1; display: flex; flex-direction: column; padding: 10px; justify-content: space-between; }
        
        .playground { 
            flex: 0.5; display: flex; align-items: center; justify-content: center; position: relative; 
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border-radius: 20px; margin-bottom: 10px;
        }
        .subject-icon { font-size: 80px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); z-index: 5; }
        .ball-dynamic { 
            position: absolute; bottom: 10px; right: 10px; font-size: 30px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .question-card { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .q-text { font-size: clamp(0.7rem, 1.6vh, 0.95rem); font-weight: 800; text-align: center; margin-bottom: 10px; min-height: 4.5em; display: flex; align-items: center; justify-content: center; line-height: 1.25; }
        .options-grid { display: flex; flex-direction: column; gap: 6px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.2s; min-height: 40px; text-align: left; padding-left: 15px; }

        #victory-screen {
            position: fixed; inset: 0; z-index: 2000; background: rgba(2, 6, 23, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        @media (max-width: 800px) {
            #game-container.mode-squad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
            #game-container.mode-duel { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .game-title { font-size: 3rem; }
            .title-container { flex-direction: column; }
        }

        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .social-link {
            color: #ef4444;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            transition: 0.2s;
        }
        .social-link:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="icon-btn" onclick="toggleFullscreen()" title="Skrin Penuh">⛶</button>
        <button class="icon-btn" onclick="location.reload()" title="Menu Utama">🏠</button>
        <button id="audio-toggle" class="icon-btn">🔈</button>
    </div>

    <div id="main-menu">
        <div class="menu-card">
            <img src="https://imgur.com/2ekydKT.png" alt="[Imej Profil]" class="profile-avatar">
            
            <div class="title-container">
                <h1 class="game-title">PJOK<br><span style="color:var(--accent); -webkit-text-fill-color:initial;">ULTIMATE</span></h1>
                <img src="https://img.icons8.com/color/96/trophy.png" alt="[Ikon Trofi]" class="side-title-img floating">
            </div>
            
            <div class="mode-selector">
                <div id="m-score" class="mode-opt active" onclick="setRules('score')">15 SOALAN</div>
                <div id="m-elim" class="mode-opt" onclick="setRules('elim')">ELIMINASI (3❤️)</div>
            </div>

            <div class="btn-group">
                <button class="menu-btn btn-primary" onclick="initGame(1)">🚀 Mod Solo</button>
                <button class="menu-btn" style="background:var(--p2); color:white" onclick="initGame(2)">🔥 Duel 1v1</button>
                <button class="menu-btn" style="background:var(--p4); color:white" onclick="initGame(4)">👑 Squad Battle</button>
            </div>
            
            <div style="margin-top:25px; font-size:0.8rem; opacity:0.7">
                <p>Karya: Arief Hidayat S.Pd</p>
                <a href="https://www.youtube.com/@fakhrifarhan" target="_blank" class="social-link">
                    <img src="https://img.icons8.com/color/24/youtube-play.png" alt="YouTube" style="width:16px; height:16px;"> YouTube: Fakhrifarhan
                </a>
            </div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="victory-screen">
        <h2 style="font-family: var(--font-title); font-size: 3rem; color: var(--accent);">PERMAINAN TAMAT!</h2>
        <div id="scoreboard-results" style="margin: 20px 0; width: 100%; max-width: 400px;"></div>
        <button class="menu-btn btn-primary" style="padding: 15px 40px" onclick="location.reload()">MAIN SEMULA</button>
    </div>

    <script>
        const getSubjectMeta = (qText) => {
            const lowQ = qText.toLowerCase();
            if (lowQ.includes("tenis meja") || lowQ.includes("ping pong") || lowQ.includes("bet")) 
                return { icon: "🏓", ball: "⚪", color: "#10b981" };
            if (lowQ.includes("bulu tangkis") || lowQ.includes("raket") || lowQ.includes("shuttlecock")) 
                return { icon: "🏸", ball: "🏸", color: "#34d399" };
            if (lowQ.includes("pencak silat") || lowQ.includes("karate") || lowQ.includes("bela diri")) 
                return { icon: "🥋", ball: "👊", color: "#ef4444" };
            if (lowQ.includes("renang") || lowQ.includes("kolam") || lowQ.includes("gaya dada")) 
                return { icon: "🏊", ball: "🌊", color: "#3b82f6" };
            if (lowQ.includes("voli") || lowQ.includes("smash")) 
                return { icon: "🏐", ball: "🏐", color: "#f59e0b" };
            if (lowQ.includes("sepak bola") || lowQ.includes("gol") || lowQ.includes("kiper")) 
                return { icon: "⚽", ball: "⚽", color: "#22c55e" };
            if (lowQ.includes("basket") || lowQ.includes("dribble")) 
                return { icon: "🏀", ball: "🏀", color: "#ea580c" };
            if (lowQ.includes("atletik") || lowQ.includes("lari") || lowQ.includes("lompat")) 
                return { icon: "🏃", ball: "👟", color: "#8b5cf6" };
            if (lowQ.includes("kebugaran") || lowQ.includes("push up") || lowQ.includes("otot")) 
                return { icon: "💪", ball: "🏋️", color: "#64748b" };
            if (lowQ.includes("senam") || lowQ.includes("lantai") || lowQ.includes("guling")) 
                return { icon: "🤸", ball: "⭕", color: "#f472b6" };
            if (lowQ.includes("kesehatan") || lowQ.includes("narkoba") || lowQ.includes("makanan")) 
                return { icon: "🏥", ball: "🍎", color: "#ec4899" };
            return { icon: "🏆", ball: "⭐", color: "#6366f1" };
        };

        const questionBank = [
            // SEPAK BOLA
            { q: "Induk organisasi sepak bola di Indonesia adalah?", options: ["PBSI", "PSSI", "PERBASI", "IPSI"], answer: 1 },
            { q: "Durasi waktu pertandingan sepak bola resmi adalah?", options: ["2 x 30 minit", "2 x 40 minit", "2 x 45 minit", "2 x 50 minit"], answer: 2 },
            { q: "Jumlah pemain dalam satu pasukan sepak bola adalah?", options: ["5 orang", "11 orang", "12 orang", "7 orang"], answer: 1 },
            { q: "Tendangan yang dilakukan jika bola keluar melalui garis gol oleh lawan adalah?", options: ["Corner kick", "Goal kick", "Penalty kick", "Free kick"], answer: 1 },
            { q: "Offside berlaku jika pemain penyerang berada di belakang?", options: ["Garis tengah", "Pemain pertahanan terakhir", "Penjaga gol sahaja", "Pengadil"], answer: 1 },
            { q: "Hukuman kad kuning diberikan pengadil sebagai tanda?", options: ["Amaran", "Pengusiran", "Gol sah", "Pelanggaran ringan"], answer: 0 },
            { q: "Teknik menendang bola dengan kura kaki digunakan untuk?", options: ["Hantaran pendek", "Sepakan kencang", "Memberhentikan bola", "Dribbling perlahan"], answer: 1 },
            { q: "Jika berlaku pelanggaran keras di dalam kotak penalti, pengadil memberikan?", options: ["Sepakan percuma", "Sepakan sudut", "Sepakan penalti", "Lontaran ke dalam"], answer: 2 },
            { q: "Pemain yang bertugas menjaga gawang disebut?", options: ["Libero", "Striker", "Goalkeeper", "Midfielder"], answer: 2 },
            { q: "Induk organisasi sepak bola dunia adalah?", options: ["FIBA", "FIFA", "BWF", "IVBF"], answer: 1 },
            { q: "Menggelecek bola dalam sepak bola disebut?", options: ["Passing", "Dribbling", "Stopping", "Shooting"], answer: 1 },
            { q: "Menanduk bola dalam sepak bola disebut?", options: ["Heading", "Kicking", "Diving", "Blocking"], answer: 0 },
            { q: "Ukuran panjang padang sepak bola standar internasional adalah?", options: ["90-110 m", "100-110 m", "110-120 m", "80-100 m"], answer: 1 },
            { q: "Lontaran ke dalam (throw-in) dilakukan menggunakan?", options: ["Satu tangan", "Dua tangan", "Kaki", "Kepala"], answer: 1 },
            { q: "Berapa jumlah pengadil dalam perlawanan sepak bola besar?", options: ["1 orang", "2 orang", "3 orang", "4 orang"], answer: 2 },

            // BOLA VOLI
            { q: "Siapa penemu permainan bola tampar?", options: ["James Naismith", "William G. Morgan", "George Hancock", "M. Luther"], answer: 1 },
            { q: "Tinggi net bola tampar untuk lelaki adalah?", options: ["2.24 m", "2.43 m", "2.44 m", "2.32 m"], answer: 1 },
            { q: "Pemain tampar yang bertugas sebagai penghantar disebut?", options: ["Spiker", "Libero", "Tosser/Setter", "Defender"], answer: 2 },
            { q: "Satu set dalam bola tampar tamat jika mencapai mata?", options: ["11 mata", "15 mata", "21 mata", "25 mata"], answer: 3 },
            { q: "Pemain tampar yang bebas keluar masuk tetapi tidak boleh melakukan smash?", options: ["Tosser", "Libero", "Spiker", "Server"], answer: 1 },
            { q: "Servis yang bolanya melambung tinggi ke belakang disebut?", options: ["Servis bawah tangan", "Floating service", "Servis lob", "Jump service"], answer: 0 },
            { q: "Gerakan memukul bola dengan kencang ke gelanggang lawan disebut?", options: ["Block", "Passing", "Smash/Spike", "Service"], answer: 2 },
            { q: "Induk organisasi bola tampar Indonesia adalah?", options: ["PBVSI", "PSSI", "PERBASI", "PASI"], answer: 0 },
            { q: "Jumlah pemain bola tampar dalam satu pasukan adalah?", options: ["5 orang", "6 orang", "11 orang", "12 orang"], answer: 1 },
            { q: "Passing bawah dilakukan jika bola datang pada kedudukan?", options: ["Di atas kepala", "Di bawah pinggang", "Setinggi mata", "Sangat jauh"], answer: 1 },
            { q: "Berapa kali masa sentuhan bola setiap pasukan dalam bola tampar?", options: ["1 kali", "2 kali", "3 kali", "4 kali"], answer: 2 },
            { q: "Ukuran gelanggang bola tampar adalah?", options: ["9x12 m", "9x18 m", "12x18 m", "10x20 m"], answer: 1 },
            { q: "Servis yang dilakukan dengan melompat tinggi disebut?", options: ["Back service", "Jump service", "Front service", "Side service"], answer: 1 },
            { q: "Gerakan membendung serangan lawan di depan jaring disebut?", options: ["Smash", "Service", "Blocking", "Digging"], answer: 2 },
            { q: "Putaran pemain tampar dilakukan mengikut?", options: ["Arah jam", "Lawan arah jam", "Bebas", "Ikut pengadil"], answer: 0 },

            // BOLA BASKET
            { q: "Penemu permainan bola keranjang adalah?", options: ["William Morgan", "James Naismith", "George Hancock", "John McEnroe"], answer: 1 },
            { q: "Induk organisasi bola keranjang Indonesia adalah?", options: ["PBVSI", "PERBASI", "PSSI", "PASI"], answer: 1 },
            { q: "Tembakan sambil melompat dengan dua langkah dalam bola keranjang disebut?", options: ["Jump shoot", "Lay up shoot", "Slam dunk", "Free throw"], answer: 1 },
            { q: "Gerakan memutar badan dengan satu kaki sebagai paksi disebut?", options: ["Dribbling", "Pivot", "Passing", "Rebound"], answer: 1 },
            { q: "Berapa jumlah pemain keranjang dalam satu pasukan di padang?", options: ["4 orang", "5 orang", "6 orang", "11 orang"], answer: 1 },
            { q: "Tembakan percuma (penalti) dalam basket bernilai?", options: ["1 mata", "2 mata", "3 mata", "4 mata"], answer: 0 },
            { q: "Membawa bola lari tanpa melantun dalam basket disebut?", options: ["Dribbling", "Traveling/Walking", "Foul", "Double"], answer: 1 },
            { q: "Menggelecek bola dalam basket dilakukan dengan cara?", options: ["Memukul", "Melantunkan", "Melempar", "Menendang"], answer: 1 },
            { q: "Tembakan dari luar garis separuh bulatan bernilai?", options: ["1 mata", "2 mata", "3 mata", "5 mata"], answer: 2 },
            { q: "Durasi perlawanan basket standar FIBA adalah?", options: ["4 x 10 minit", "2 x 20 minit", "4 x 12 minit", "2 x 15 minit"], answer: 0 },
            { q: "Menangkap bola lantun yang gagal masuk keranjang disebut?", options: ["Dribbling", "Rebound", "Intercept", "Block"], answer: 1 },
            { q: "Hantaran setinggi dada dalam basket disebut?", options: ["Bounce pass", "Overhead pass", "Chest pass", "Baseball pass"], answer: 2 },
            { q: "Hantaran dengan melantunkan bola ke lantai disebut?", options: ["Chest pass", "Bounce pass", "Overhead pass", "Hook pass"], answer: 1 },
            { q: "Pelanggaran kerana melantunkan bola dengan dua tangan disebut?", options: ["Traveling", "Double", "Foul", "Charging"], answer: 1 },
            { q: "Waktu maksima pasukan menyerang untuk melakukan tembakan adalah?", options: ["24 saat", "30 saat", "10 saat", "5 saat"], answer: 0 },

            // KESEHATAN & LAIN-LAIN
            { q: "Zat dalam rokok yang menyebabkan ketagihan adalah?", options: ["Tar", "Nikotin", "Oksigen", "Hidrogen"], answer: 1 },
            { q: "PHBS adalah singkatan bagi?", options: ["Pola Hidup Bersih Sihat", "Perilaku Hidup Bersih dan Sihat", "Pedoman Hidup Bahagia Sihat", "Peraturan Hidup Bersama Sihat"], answer: 1 },
            { q: "Vitamin yang baik untuk daya tahan tubuh adalah?", options: ["Vitamin A", "Vitamin C", "Vitamin D", "Vitamin K"], answer: 1 },
            { q: "Zat adiktif yang sah tetapi berbahaya adalah?", options: ["Ganja", "Rokok & Alkohol", "Sabu", "Ekstasi"], answer: 1 },
            { q: "Kebersihan persekitaran sekolah adalah tanggungjawab?", options: ["Guru sahaja", "Murid sahaja", "Guru besar sahaja", "Warga sekolah"], answer: 3 }
        ];

        let selectedRuleMode = 'score';
        let audioEnabled = false;
        let gameActive = true;
        let players = [];
        const SCORE_MODE_MAX = 15;

        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playSFX(freq, type, duration) {
                if (!audioEnabled || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            }
        };

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function setRules(mode) {
            selectedRuleMode = mode;
            document.getElementById('m-score').classList.toggle('active', mode === 'score');
            document.getElementById('m-elim').classList.toggle('active', mode === 'elim');
        }

        document.getElementById('audio-toggle').onclick = (e) => {
            audioEnabled = !audioEnabled;
            e.currentTarget.textContent = audioEnabled ? '🔊' : '🔈';
            AudioEngine.init();
        };

        class Player {
            constructor(id, container) {
                this.id = id;
                this.score = 0;
                this.lives = 3;
                this.questionsCount = 0;
                this.isDone = false;
                this.isEliminated = false;
                this.timer = null;
                this.questionQueue = [];
                this.refreshQueue();

                this.el = document.createElement('div');
                this.el.className = 'player-area';
                container.appendChild(this.el);
                this.nextQuestion();
            }

            refreshQueue() {
                this.questionQueue = Array.from({length: questionBank.length}, (_, i) => i).sort(() => Math.random() - 0.5);
            }

            updateUI(qMeta = null) {
                const stats = selectedRuleMode === 'score' ? 
                    `SOALAN: ${this.questionsCount}/${SCORE_MODE_MAX}` : 
                    `NYAWA: ${'❤️'.repeat(this.lives)}`;

                this.el.innerHTML = `
                    <div class="hud" style="border-bottom: 3px solid var(--p${this.id})">
                        <span>PEMAIN ${this.id}</span>
                        <div class="stats-area" style="color:var(--accent)">${stats}</div>
                    </div>
                    <div class="timer-track"><div class="timer-fill"></div></div>
                    <div class="game-content">
                        <div class="playground" style="background: radial-gradient(circle, ${qMeta?.color || '#3b82f6'}22 0%, transparent 80%)">
                            <div class="subject-icon floating">${qMeta?.icon || "🏆"}</div>
                            <div class="ball-dynamic">${qMeta?.ball || "⭐"}</div>
                        </div>
                        <div class="question-card">
                            <div class="q-text">...</div>
                            <div class="options-grid">
                                ${[0,1,2,3].map(i => `<button class="option-btn" onclick="players[${this.id-1}].checkAnswer(${i})"></button>`).join('')}
                            </div>
                        </div>
                        <div style="text-align:center; font-weight:900; color:var(--p${this.id}); padding: 5px; font-size:1.2rem">SKOR: ${this.score}</div>
                    </div>
                `;
            }

            nextQuestion() {
                if (!gameActive || this.isDone || this.isEliminated) return;
                
                if (selectedRuleMode === 'score' && this.questionsCount >= SCORE_MODE_MAX) {
                    this.finish();
                    return;
                }

                if (this.questionQueue.length === 0) this.refreshQueue();
                this.currentIdx = this.questionQueue.pop();
                const q = questionBank[this.currentIdx];
                const meta = getSubjectMeta(q.q);
                
                this.updateUI(meta);
                
                this.el.querySelector('.q-text').textContent = q.q;
                const btns = this.el.querySelectorAll('.option-btn');
                btns.forEach((b, i) => {
                    b.textContent = q.options[i];
                    b.disabled = false;
                });

                this.startTimer();
            }

            startTimer() {
                if (this.timer) clearInterval(this.timer);
                let timeLeft = 12;
                const fill = this.el.querySelector('.timer-fill');
                this.timer = setInterval(() => {
                    if (!gameActive) { clearInterval(this.timer); return; }
                    timeLeft -= 0.1;
                    if (fill) fill.style.width = (timeLeft / 12 * 100) + '%';
                    if (timeLeft <= 0) {
                        clearInterval(this.timer);
                        this.handleResult(false);
                    }
                }, 100);
            }

            checkAnswer(idx) {
                if (!gameActive || this.isDone || this.isEliminated) return;
                clearInterval(this.timer);
                const isCorrect = idx === questionBank[this.currentIdx].answer;
                this.handleResult(isCorrect, idx);
            }

            handleResult(isCorrect, btnIdx = null) {
                const btns = this.el.querySelectorAll('.option-btn');
                const ball = this.el.querySelector('.ball-dynamic');
                btns.forEach(b => b.disabled = true);
                
                if (isCorrect) {
                    AudioEngine.playSFX(600, 'sine', 0.1);
                    if (btnIdx !== null) btns[btnIdx].style.background = 'var(--primary)';
                    this.score += 100;
                    if (ball) ball.style.transform = "scale(2.5) translate(-60px, -60px) rotate(360deg)";
                } else {
                    AudioEngine.playSFX(150, 'square', 0.3);
                    this.el.querySelector('.question-card').classList.add('shake');
                    if (btnIdx !== null) btns[btnIdx].style.background = 'var(--danger)';
                    btns[questionBank[this.currentIdx].answer].style.border = '2px solid var(--primary)';
                    if (selectedRuleMode === 'elim') this.lives--;
                }

                this.questionsCount++;

                setTimeout(() => {
                    if (selectedRuleMode === 'elim' && this.lives <= 0) {
                        this.isEliminated = true;
                        this.el.classList.add('eliminated');
                    }
                    this.nextQuestion();
                    checkGlobalEnd();
                }, 1000);
            }

            finish() {
                this.isDone = true;
                this.el.classList.add('eliminated');
                const qText = this.el.querySelector('.q-text');
                if (qText) qText.textContent = "MISI SELESAI!";
                checkGlobalEnd();
            }
        }

        function initGame(num) {
            AudioEngine.init();
            gameActive = true;
            document.getElementById('main-menu').style.display = 'none';
            const gc = document.getElementById('game-container');
            gc.style.display = 'grid';
            gc.innerHTML = '';
            gc.className = `mode-${num === 1 ? 'solo' : num === 2 ? 'duel' : 'squad'}`;
            players = [];
            for(let i=1; i<=num; i++) players.push(new Player(i, gc));
        }

        function checkGlobalEnd() {
            const finished = players.every(p => p.isDone || p.isEliminated);
            if (finished && players.length > 0) endGame();
        }

        function endGame() {
            gameActive = false;
            const screen = document.getElementById('victory-screen');
            const board = document.getElementById('scoreboard-results');
            screen.style.display = 'flex';
            board.innerHTML = '';

            const sorted = [...players].sort((a, b) => b.score - a.score);
            sorted.forEach((p, i) => {
                const row = document.createElement('div');
                row.style.cssText = `display:flex; justify-content:space-between; padding:15px; margin-bottom:10px; background:rgba(255,255,255,0.05); border-radius:12px; border-left:8px solid var(--p${p.id}); align-items:center;`;
                row.innerHTML = `<span style="font-weight:900">#${i+1} Pemain ${p.id}</span><strong style="font-size:1.4rem">${p.score} PT</strong>`;
                board.appendChild(row);
            });
        }
    </script>
</body>
</html>
