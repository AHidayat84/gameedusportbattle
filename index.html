<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduSport Battle - PJOK SMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --p1: #3b82f6;
            --p2: #ef4444;
            --p3: #f59e0b;
            --p4: #a855f7;
            --font-main: 'Outfit', sans-serif;
            --font-title: 'Bangers', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; }
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .icon-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 50%; width: 45px; height: 45px; 
            color: white; cursor: pointer; backdrop-filter: blur(10px); 
            transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; font-size: 1.1rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        #main-menu {
            position: fixed; inset: 0; z-index: 900;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-y: auto; padding: 40px 20px;
        }

        .menu-card { 
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 500px; width: 100%; position: relative;
        }

        .header-container {
            display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 25px;
        }

        .logo-circle-frame {
            width: 140px; height: 140px; border-radius: 50%; overflow: hidden;
            border: 4px solid var(--secondary); box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
            background: rgba(255, 255, 255, 0.05); display: flex; align-items: center;
            justify-content: center; position: relative;
        }

        .top-logo { width: 100%; height: 100%; object-fit: cover; }

        .title-row { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .side-logo { width: 50px; height: auto; }

        .game-title { 
            font-family: var(--font-title); font-size: 3rem; line-height: 0.9; text-align: center;
            background: linear-gradient(135deg, #fff 20%, var(--secondary) 50%, var(--primary) 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .menu-btn { padding: 12px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-primary { background: #fff; color: #000; }
        
        .mode-selector { display: flex; background: rgba(0,0,0,0.4); border-radius: 14px; padding: 5px; margin-bottom: 10px; }
        .mode-opt { flex: 1; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 900; color: #94a3b8; }
        .mode-opt.active { background: #fff; color: #000; }

        .footer-credits {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .author-name {
            font-size: 0.9rem;
            color: #f1f5f9;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .youtube-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #ef4444;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            background: rgba(239, 68, 68, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            transition: 0.3s;
            align-self: center;
        }
        .youtube-link:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        #game-container { position: fixed; inset: 0; display: none; width: 100%; height: 100%; }
        .player-area { position: relative; display: flex; flex-direction: column; overflow: hidden; background: #020617; border: 1px solid rgba(255,255,255,0.05); }
        .player-area.eliminated { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        .hud { padding: 10px; display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 900; background: rgba(0,0,0,0.2); }
        .timer-track { height: 5px; background: rgba(255,255,255,0.1); width: 100%; }
        .timer-fill { height: 100%; background: var(--secondary); width: 100%; transition: width 0.1s linear; }

        .game-content { flex: 1; display: flex; flex-direction: column; padding: 12px; justify-content: space-between; }
        .playground { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .ball { font-size: clamp(3rem, 12vh, 6rem); transition: 0.4s; z-index: 5; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }

        .question-card { background: rgba(255,255,255,0.06); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 10; }
        .q-text { font-size: clamp(0.85rem, 2vh, 1.1rem); font-weight: 800; text-align: center; margin-bottom: 12px; min-height: 4em; display: flex; align-items: center; justify-content: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; color: white; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: 0.2s; min-height: 50px; }

        #victory-screen {
            position: fixed; inset: 0; z-index: 2000; background: rgba(2, 6, 23, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        #game-container.mode-solo { grid-template-columns: 1fr; }
        #game-container.mode-duel { grid-template-columns: 1fr 1fr; }
        #game-container.mode-squad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        @media (max-width: 600px) {
            #game-container.mode-duel { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .logo-circle-frame { width: 100px; height: 100px; }
            .game-title { font-size: 2.2rem; }
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .shake { animation: shake 0.3s ease-in-out; }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>

            { q: "Jumlah pemain sepak bola dalam satu tim adalah?", options: ["6 orang", "11 orang", "5 orang", "12 orang"], answer: 1 },
            { q: "Gerakan menendang bola ke gawang disebut?", options: ["Dribbling", "Passing", "Shooting", "Stopping"], answer: 2 },
            { q: "Wasit dalam sepak bola berjumlah?", options: ["1 utama, 2 hakim garis", "2 utama", "3 utama", "1 saja"], answer: 0 },
            { q: "Ukuran lebar gawang sepak bola adalah?", options: ["7.32 m", "5.32 m", "2.44 m", "8.32 m"], answer: 0 },
            { q: "Induk sepak bola Indonesia adalah?", options: ["PSSI", "PBSI", "PASI", "PBVSI"], answer: 0 },
            { q: "Teknik menghentikan bola dengan kaki disebut?", options: ["Dribbling", "Passing", "Stopping", "Heading"], answer: 2 },
            { q: "Pemain sepak bola yang bertugas mencetak gol adalah?", options: ["Kiper", "Bek", "Gelandang", "Striker"], answer: 3 },
            { q: "Awal dimulainya pertandingan sepak bola disebut?", options: ["Corner", "Kick off", "Finish", "Free kick"], answer: 1 },

            // BOLA BASKET & ATLETIK (86-102)
            { q: "Siapa penemu permainan bola basket?", options: ["James Naismith", "William Morgan", "George Hancock", "Michael Jordan"], answer: 0 },
            { q: "Jumlah pemain basket per tim adalah?", options: ["4 orang", "5 orang", "6 orang", "11 orang"], answer: 1 },
            { q: "Gerakan berputar dengan satu kaki sebagai poros disebut?", options: ["Dribble", "Pivot", "Lay up", "Rebound"], answer: 1 },
            { q: "Tembakan sambil melayang dalam basket disebut?", options: ["Slam dunk", "Jump shot", "Lay up shot", "Free throw"], answer: 2 },
            { q: "Durasi permainan basket internasional (FIBA) adalah?", options: ["4x10 menit", "4x12 menit", "2x20 menit", "2x45 menit"], answer: 0 },
            { q: "Pelanggaran membawa bola lebih dari 2 langkah tanpa dribble?", options: ["Foul", "Traveling", "Double", "Walking"], answer: 1 },
            { q: "Induk organisasi basket Indonesia?", options: ["PERBASI", "PSSI", "PBSI", "PBVSI"], answer: 0 },
            { q: "Start yang digunakan untuk lari jarak pendek?", options: ["Berdiri", "Melayang", "Jongkok", "Duduk"], answer: 2 },
            { q: "Nomor lari jarak pendek adalah?", options: ["100m, 200m, 400m", "800m, 1500m", "5000m", "Maraton"], answer: 0 },
            { q: "Alat yang dibawa dalam lari estafet adalah?", options: ["Bola", "Tongkat", "Tali", "Topi"], answer: 1 },
            { q: "Induk organisasi atletik Indonesia?", options: ["PASI", "PSSI", "PRSI", "PBSI"], answer: 0 },
            { q: "Lompat jauh menggunakan tumpuan berapa kaki?", options: ["1 kaki", "2 kaki", "Tangan", "Kepala"], answer: 0 },
            { q: "Gaya dalam lompat jauh adalah, kecuali?", options: ["Gaya menggantung", "Gaya jongkok", "Gaya bebas", "Gaya berjalan di udara"], answer: 2 },
            { q: "Push up melatih otot?", options: ["Perut", "Lengan & dada", "Paha", "Leher"], answer: 1 },
            { q: "Sit up melatih otot?", options: ["Perut", "Lengan", "Punggung", "Betis"], answer: 0 },
            { q: "Kemampuan sendi melakukan gerakan luas disebut?", options: ["Kekuatan", "Kecepatan", "Kelenturan", "Keseimbangan"], answer: 2 },
            { q: "Back up melatih otot?", options: ["Perut", "Punggung", "Lengan", "Tangan"], answer: 1 }
        ];

        // LOGIC GAME TETAP SAMA (HANYA BANK SOAL YANG BERUBAH)
        let selectedRuleMode = 'score';
        let audioEnabled = false;
        let gameActive = true;
        let players = [];
        const SCORE_MODE_MAX = 15;

        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playSFX(freq, type, duration) {
                if (!audioEnabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
        };

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function setRules(mode) {
            selectedRuleMode = mode;
            document.getElementById('m-score').classList.toggle('active', mode === 'score');
            document.getElementById('m-elim').classList.toggle('active', mode === 'elim');
        }

        document.getElementById('audio-toggle').onclick = (e) => {
            audioEnabled = !audioEnabled;
            e.currentTarget.textContent = audioEnabled ? '🔊' : '🔈';
            AudioEngine.init();
        };

        class Player {
            constructor(id, container) {
                this.id = id;
                this.score = 0;
                this.lives = 3;
                this.questionsCount = 0;
                this.isDone = false;
                this.isEliminated = false;
                this.timer = null;
                this.questionQueue = []; 
                this.refreshQueue();

                this.el = document.createElement('div');
                this.el.className = 'player-area';
                this.updateUI();
                container.appendChild(this.el);
                this.nextQuestion();
            }

            refreshQueue() {
                let indices = Array.from({length: questionBank.length}, (_, i) => i);
                indices.sort(() => Math.random() - 0.5);
                this.questionQueue = indices;
            }

            updateUI() {
                const stats = selectedRuleMode === 'score' ? 
                    `SOAL: ${this.questionsCount}/${SCORE_MODE_MAX}` : 
                    `NYAWA: ${'❤️'.repeat(this.lives)}`;

                this.el.innerHTML = `
                    <div class="hud" style="border-bottom: 3px solid var(--p${this.id})">
                        <span>PEMAIN ${this.id}</span>
                        <div class="stats-area">${stats}</div>
                    </div>
                    <div class="timer-track"><div class="timer-fill"></div></div>
                    <div class="game-content">
                        <div class="playground"><div class="ball floating">🏐</div></div>
                        <div class="question-card">
                            <div class="q-text">Siap?</div>
                            <div class="options-grid">
                                ${[0,1,2,3].map(i => `<button class="option-btn" onclick="players[${this.id-1}].checkAnswer(${i})"></button>`).join('')}
                            </div>
                        </div>
                        <div style="text-align:center; font-weight:900; color:var(--p${this.id}); padding: 5px; font-size: 1.1rem;">SKOR: ${this.score}</div>
                    </div>
                `;
            }

            nextQuestion() {
                if (!gameActive || this.isDone || this.isEliminated) return;
                
                if (selectedRuleMode === 'score' && this.questionsCount >= SCORE_MODE_MAX) {
                    this.finish();
                    return;
                }

                if (this.questionQueue.length === 0) this.refreshQueue();
                this.currentIdx = this.questionQueue.pop();
                
                const q = questionBank[this.currentIdx];
                this.el.querySelector('.q-text').textContent = q.q;
                
                const btns = this.el.querySelectorAll('.option-btn');
                btns.forEach((b, i) => {
                    b.textContent = q.options[i];
                    b.style.background = 'rgba(255,255,255,0.05)';
                    b.disabled = false;
                });

                this.startTimer();
            }

            startTimer() {
                if (this.timer) clearInterval(this.timer);
                let timeLeft = 12;
                const fill = this.el.querySelector('.timer-fill');
                this.timer = setInterval(() => {
                    if (!gameActive) { clearInterval(this.timer); return; }
                    timeLeft -= 0.1;
                    fill.style.width = (timeLeft / 12 * 100) + '%';
                    if (timeLeft <= 0) {
                        clearInterval(this.timer);
                        this.handleResult(false);
                    }
                }, 100);
            }

            checkAnswer(idx) {
                if (!gameActive || this.isDone || this.isEliminated) return;
                clearInterval(this.timer);
                const isCorrect = idx === questionBank[this.currentIdx].answer;
                this.handleResult(isCorrect, idx);
            }

            handleResult(isCorrect, btnIdx = null) {
                const btns = this.el.querySelectorAll('.option-btn');
                const ball = this.el.querySelector('.ball');
                btns.forEach(b => b.disabled = true);
                
                if (isCorrect) {
                    AudioEngine.playSFX(600, 'sine', 0.1);
                    if (btnIdx !== null) btns[btnIdx].style.background = 'var(--primary)';
                    this.score += 100;
                    ball.style.transform = "scale(1.4) translateY(-20px)";
                    setTimeout(() => ball.style.transform = "", 500);
                } else {
                    AudioEngine.playSFX(150, 'square', 0.3);
                    this.el.querySelector('.question-card').classList.add('shake');
                    if (btnIdx !== null) btns[btnIdx].style.background = 'var(--danger)';
                    const correctIdx = questionBank[this.currentIdx].answer;
                    btns[correctIdx].style.border = '2px solid var(--primary)';
                    
                    if (selectedRuleMode === 'elim') {
                        this.lives--;
                    }
                }

                this.questionsCount++;

                setTimeout(() => {
                    this.el.querySelector('.question-card').classList.remove('shake');
                    if (selectedRuleMode === 'elim' && this.lives <= 0) {
                        this.isEliminated = true;
                        this.el.classList.add('eliminated');
                    }
                    this.refreshHUD();
                    this.nextQuestion();
                    checkGlobalEnd();
                }, 800);
            }

            refreshHUD() {
                const statsArea = this.el.querySelector('.stats-area');
                if (!statsArea) return;
                if (selectedRuleMode === 'score') {
                    statsArea.textContent = `SOAL: ${Math.min(this.questionsCount, SCORE_MODE_MAX)}/${SCORE_MODE_MAX}`;
                } else {
                    statsArea.textContent = `NYAWA: ${'❤️'.repeat(Math.max(0, this.lives))}`;
                }
                const scoreDiv = this.el.querySelector('.game-content > div:last-child');
                if (scoreDiv) scoreDiv.textContent = `SKOR: ${this.score}`;
            }

            finish() {
                this.isDone = true;
                this.el.classList.add('eliminated');
                this.el.querySelector('.q-text').textContent = "SELESAI!";
                this.el.querySelector('.timer-fill').style.width = '0%';
            }
        }

        function initGame(num) {
            AudioEngine.init();
            gameActive = true;
            document.getElementById('main-menu').style.display = 'none';
            const gc = document.getElementById('game-container');
            gc.style.display = 'grid';
            gc.innerHTML = '';
            gc.className = num === 1 ? 'mode-solo' : num === 2 ? 'mode-duel' : 'mode-squad';
            players = [];
            for(let i=1; i<=num; i++) players.push(new Player(i, gc));
        }

        function checkGlobalEnd() {
            if (selectedRuleMode === 'score') {
                if (players.every(p => p.isDone)) endGame();
            } else {
                const active = players.filter(p => !p.isEliminated);
                if (players.length > 1 && active.length <= 1) endGame();
                else if (players.length === 1 && active.length === 0) endGame();
            }
        }

        function endGame() {
            gameActive = false;
            const screen = document.getElementById('victory-screen');
            const board = document.getElementById('scoreboard-results');
            screen.style.display = 'flex';
            board.innerHTML = '';

            const sorted = [...players].sort((a, b) => b.score - a.score);
            sorted.forEach((p, i) => {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.justifyContent = 'space-between';
                row.style.alignItems = 'center';
                row.style.padding = '15px';
                row.style.marginBottom = '8px';
                row.style.background = 'rgba(255,255,255,0.05)';
                row.style.borderRadius = '15px';
                row.style.borderLeft = `6px solid var(--p${p.id})`;
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px">
                        <span style="font-weight:900; font-size:1.2rem; color:var(--accent)">#${i+1}</span>
                        <span style="font-weight:700">Pemain ${p.id}</span>
                    </div>
                    <strong style="font-size:1.2rem">${p.score} PT</strong>
                `;
                board.appendChild(row);
            });

            AudioEngine.playSFX(500, 'sine', 0.5);
        }
    </script>
</body>
