<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduSport Battle</title>
    <!-- Font Catchy untuk usia SMP: Outfit (Modern) & Bangers (Komik/Energi) -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --p1: #3b82f6; --p2: #ef4444; --p3: #f59e0b; --p4: #a855f7;
            --font-main: 'Outfit', sans-serif;
            --font-title: 'Bangers', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; }
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ================= NAVIGATION & MENUS ================= */
        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 12px; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 45px; height: 45px; color: white; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; text-decoration: none; }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }

        #main-menu {
            position: fixed; inset: 0; z-index: 900;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-y: auto; padding: 40px 20px;
        }

        .menu-card { 
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
            max-width: 500px;
            width: 100%;
            position: relative;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= HEADER SECTION (JUDUL + GAMBAR) ================= */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .title-group {
            text-align: left;
        }

        .game-title { 
            font-family: var(--font-title);
            font-size: 3rem; 
            line-height: 0.9;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 20%, var(--secondary) 50%, var(--primary) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-sub {
            color: var(--accent);
            -webkit-text-fill-color: initial;
        }

        .side-image {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 2px solid var(--secondary);
            flex-shrink: 0;
        }
        .side-image img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* ================= CREATOR PHOTO DECORATION ================= */
        .creator-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .creator-glow {
            position: absolute;
            inset: -5px;
            background: conic-gradient(from 0deg, var(--secondary), var(--primary), var(--accent), var(--secondary));
            border-radius: 50%;
            animation: rotateGlow 4s linear infinite;
            filter: blur(8px);
            opacity: 0.6;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .creator-container {
            width: 85px;
            height: 85px;
            position: relative;
            padding: 3px;
            background: #0f172a;
            border-radius: 50%;
            z-index: 2;
            overflow: hidden;
        }

        .creator-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            background: #1e293b;
        }

        /* ================= TOMBOL & SELEKTOR ================= */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; width: 100%; }
        .menu-btn { 
            padding: 12px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.95rem;
            text-transform: uppercase;
        }
        .btn-primary { background: #fff; color: #000; }
        
        .mode-selector { display: flex; background: rgba(0,0,0,0.4); border-radius: 14px; padding: 5px; margin-bottom: 10px; }
        .mode-opt { flex: 1; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 900; color: #94a3b8; }
        .mode-opt.active { background: #fff; color: #000; }

        .footer-credits {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            color: white;
            text-decoration: none;
            padding: 6px 15px;
            background: #FF0000;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        /* ================= GAMEPLAY LAYOUT ================= */
        #game-container { 
            position: fixed; 
            inset: 0; 
            display: none; 
            width: 100%;
            height: 100%;
        }

        @media (orientation: portrait) {
            .mode-duel { grid-template-rows: 1fr 1fr; grid-template-columns: 1fr; }
            .mode-squad { grid-template-rows: repeat(4, 1fr); grid-template-columns: 1fr; }
            .player-area { border-bottom: 1px solid rgba(255,255,255,0.1); }
        }

        @media (orientation: landscape) {
            .mode-duel { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
            .mode-squad { grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr; }
            .player-area { border-right: 1px solid rgba(255,255,255,0.1); }
        }

        .player-area { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            background: #020617;
        }

        .hud { padding: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 900; }
        .timer-track { height: 4px; background: rgba(255,255,255,0.1); width: 100%; }
        .timer-fill { height: 100%; background: #fff; width: 100%; }

        .game-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 10px; 
            justify-content: space-between;
        }

        .playground { flex: 1; display: flex; align-items: center; justify-content: center; }
        .ball { font-size: clamp(2rem, 10vh, 5rem); transition: 0.3s; }

        .question-card { 
            background: rgba(255,255,255,0.07); 
            border-radius: 16px; 
            padding: 12px; 
            backdrop-filter: blur(10px);
            max-height: 60%;
            overflow-y: auto;
        }
        
        .q-text { font-size: clamp(0.9rem, 2.5vh, 1.2rem); font-weight: 800; text-align: center; margin-bottom: 10px; line-height: 1.2; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }

        @media (min-aspect-ratio: 16/9) { .options-grid { grid-template-columns: 1fr 1fr; } }
        
        .option-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px; 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            cursor: pointer;
            font-size: 0.85rem;
        }

        .game-over { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 100; text-align: center;
        }
        .game-over.active { display: flex; }
        .go-btn { margin-top: 20px; padding: 12px 25px; background: #fff; color: #000; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }

        @media (max-width: 600px) {
            .game-title { font-size: 2.2rem; }
            .header-section { gap: 10px; }
            .side-image { width: 60px; height: 60px; }
            .menu-card { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="icon-btn" onclick="location.reload()">🏠</button>
        <button id="audio-toggle" class="icon-btn">🔈</button>
    </div>

    <div id="main-menu">
        <div class="menu-card">
            <div class="creator-wrapper">
                <div class="creator-glow"></div>
                <div class="creator-container">
                    <img src="https://i.imgur.com/TKnsYjX.png" alt="Arief Hidayat S.Pd" class="creator-img" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Arief'">
                </div>
            </div>
            
            <div class="header-section">
                <div class="side-image">
                    <img src="https://i.imgur.com/CMSJ8wk.png" alt="Logo EduSport" onerror="this.style.display='none'">
                </div>
                <div class="title-group">
                    <h1 class="game-title">EDUSPORT <br><span class="title-sub">BATTLE</span></h1>
                </div>
            </div>
            
            <div class="mode-selector">
                <div id="m-score" class="mode-opt active" onclick="setRules('score')">MODE SKOR</div>
                <div id="m-elim" class="mode-opt" onclick="setRules('elim')">ELIMINASI</div>
            </div>

            <div class="btn-group">
                <button class="menu-btn btn-primary" onclick="initGame(1)">🚀 Main Sendiri</button>
                <button class="menu-btn" style="background:var(--p2); color:white" onclick="initGame(2)">🔥 Duel 1v1</button>
                <button class="menu-btn" style="background:var(--p4); color:white" onclick="initGame(4)">👑 Squad 4P</button>
            </div>

            <div class="footer-credits">
                Karya: <strong>Arief Hidayat S.Pd</strong><br>
                <a href="https://www.youtube.com/@fakhrifarhan" target="_blank" class="social-link">
                    <svg style="width:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    @fakhrifarhan
                </a>
            </div>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        const SPORTS_THEMES = {
            FOOTBALL: { icon: '⚽' },
            BASKET: { icon: '🏀' },
            VOLLEY: { icon: '🏐' },
            BADMINTON: { icon: '🏸' },
            ATHLETIC: { icon: '🏃' },
            SWIM: { icon: '🏊' }
        };

        const questionBank = [
            { q: "Durasi waktu istirahat antar babak sepak bola?", options: ["10 Menit", "15 Menit", "20 Menit", "5 Menit"], answer: 1, theme: 'FOOTBALL' },
            { q: "Tinggi ring basket dari lantai?", options: ["2.50 Meter", "3.05 Meter", "3.50 Meter", "2.75 Meter"], answer: 1, theme: 'BASKET' },
            { q: "Teknik memukul shuttlecock tipis di depan net?", options: ["Smash", "Dropshot", "Netting", "Lob"], answer: 2, theme: 'BADMINTON' },
            { q: "Jumlah pemain voli dalam satu lapangan?", options: ["5 Orang", "6 Orang", "11 Orang", "4 Orang"], answer: 1, theme: 'VOLLEY' },
            { q: "Start yang digunakan pelari jarak menengah?", options: ["Jongkok", "Berdiri", "Melayang", "Duduk"], answer: 1, theme: 'ATHLETIC' },
            { q: "Gaya renang dengan posisi wajah menghadap langit?", options: ["Gaya Bebas", "Gaya Punggung", "Gaya Dada", "Gaya Batu"], answer: 1, theme: 'SWIM' },
            { q: "Pelanggaran handsball terjadi jika bola terkena?", options: ["Kepala", "Tangan", "Dada", "Paha"], answer: 1, theme: 'FOOTBALL' },
            { q: "Istilah memasukkan bola sambil melompat di basket?", options: ["Lay up", "Dribble", "Pivot", "Passing"], answer: 0, theme: 'BASKET' },
            { q: "Pemain voli yang bebas keluar masuk (bertahan)?", options: ["Setter", "Spiker", "Libero", "Server"], answer: 2, theme: 'VOLLEY' },
            { q: "Lari estafet 4x100 meter membutuhkan pemain?", options: ["2 Orang", "4 Orang", "1 Orang", "6 Orang"], answer: 1, theme: 'ATHLETIC' },
            { q: "Berapa jumlah wasit dalam pertandingan sepak bola profesional?", options: ["2 Orang", "4 Orang", "3 Orang", "1 Orang"], answer: 1, theme: 'FOOTBALL' },
            { q: "Berapa menit waktu bersih satu kuarter dalam basket FIBA?", options: ["10 Menit", "12 Menit", "8 Menit", "15 Menit"], answer: 0, theme: 'BASKET' },
            { q: "Service dalam voli dilakukan dari area?", options: ["Depan Net", "Belakang Garis Akhir", "Samping", "Tengah"], answer: 1, theme: 'VOLLEY' },
            { q: "Pukulan keras menukik dalam bulu tangkis disebut?", options: ["Lifting", "Drive", "Smash", "Clear"], answer: 2, theme: 'BADMINTON' },
            { q: "Nomor lari jarak pendek meliputi?", options: ["100, 200, 400m", "800, 1500m", "5000, 10000m", "Maraton"], answer: 0, theme: 'ATHLETIC' },
            { q: "Pemain yang bertugas mengatur serangan dalam voli?", options: ["Tosser", "Libero", "Blocker", "Server"], answer: 0, theme: 'VOLLEY' },
            { q: "Gaya dada dalam renang sering disebut gaya?", options: ["Katak", "Lumba-lumba", "Kupu-kupu", "Anjing"], answer: 0, theme: 'SWIM' },
            { q: "Berapa poin kemenangan dalam satu set bulu tangkis?", options: ["21 Poin", "25 Poin", "15 Poin", "11 Poin"], answer: 0, theme: 'BADMINTON' },
            { q: "Sudut lemparan dalam tolak peluru adalah?", options: ["45 Derajat", "40 Derajat", "30 Derajat", "90 Derajat"], answer: 1, theme: 'ATHLETIC' }
        ];

        let selectedRuleMode = 'score'; 
        let audioEnabled = false;

        function setRules(mode) {
            selectedRuleMode = mode;
            document.getElementById('m-score').classList.toggle('active', mode === 'score');
            document.getElementById('m-elim').classList.toggle('active', mode === 'elim');
        }

        const SFX = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(f, t, d, v=0.1) {
                if(!audioEnabled || !this.ctx) return;
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(v, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            }
        };

        document.getElementById('audio-toggle').onclick = (e) => {
            audioEnabled = !audioEnabled;
            e.target.textContent = audioEnabled ? '🔊' : '🔈';
            SFX.init();
        };

        class Player {
            constructor(id, container) {
                this.id = id;
                this.score = 0;
                this.isAlive = true;
                this.questionsAttempted = 0;
                this.maxQuestions = 15;
                this.qIndex = 0;
                this.timeLeft = 10;
                this.timer = null;
                // Ambil 15 soal acak yang tidak berulang dari bank soal
                this.questions = [...questionBank]
                    .sort(() => Math.random() - 0.5)
                    .slice(0, this.maxQuestions);

                this.el = document.createElement('div');
                this.el.className = `player-area`;
                this.el.innerHTML = `
                    <div class="hud">
                        <span>P${id} | Soal: <span class="q-count">0</span>/${this.maxQuestions}</span> 
                        <span class="score-val">0</span>
                    </div>
                    <div class="timer-track"><div class="timer-fill"></div></div>
                    <div class="game-content">
                        <div class="playground"><div class="ball">⚽</div></div>
                        <div class="question-card">
                            <div class="q-text">...</div>
                            <div class="options-grid">
                                ${[0,1,2,3].map(i => `<button class="option-btn" data-idx="${i}"></button>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="game-over">
                        <h2 style="color:var(--accent); font-family:var(--font-title); font-size:2rem;">SELESAI!</h2>
                        <h1 style="font-size:3rem">SKOR: <span class="go-score">0</span></h1>
                        <button class="go-btn" onclick="location.reload()">MAIN LAGI</button>
                    </div>
                `;
                container.appendChild(this.el);

                this.scoreDisplay = this.el.querySelector('.score-val');
                this.qCountDisplay = this.el.querySelector('.q-count');
                this.timerFill = this.el.querySelector('.timer-fill');
                this.qText = this.el.querySelector('.q-text');
                this.ball = this.el.querySelector('.ball');
                this.btns = this.el.querySelectorAll('.option-btn');
                this.gameOverScreen = this.el.querySelector('.game-over');
                this.goScoreDisplay = this.el.querySelector('.go-score');

                this.btns.forEach(b => b.onclick = () => this.checkAnswer(b));
                this.nextQuestion();
            }

            nextQuestion() {
                if(!this.isAlive) return;

                // Batasan 15 soal untuk Mode Score
                if (selectedRuleMode === 'score' && this.questionsAttempted >= this.maxQuestions) {
                    this.endGame();
                    return;
                }

                // Jika soal habis sebelum batas (misal bank soal < 15), ulang dari bank soal acak lagi
                if (this.qIndex >= this.questions.length) {
                    this.questions = [...questionBank].sort(() => Math.random() - 0.5);
                    this.qIndex = 0;
                }

                this.btns.forEach(b => { 
                    b.style.background = 'rgba(255,255,255,0.05)';
                    b.disabled = false; 
                });

                const q = this.questions[this.qIndex];
                this.qText.textContent = q.q;
                this.ball.textContent = SPORTS_THEMES[q.theme].icon;

                const order = [0,1,2,3].sort(() => Math.random() - 0.5);
                this.btns.forEach((b, i) => {
                    b.textContent = q.options[order[i]];
                    b.dataset.realIdx = order[i];
                });

                this.resetTimer();
            }

            resetTimer() {
                clearInterval(this.timer);
                this.timeLeft = 10;
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    this.timerFill.style.width = (this.timeLeft * 10) + '%';
                    if(this.timeLeft <= 0) this.handleWrong(null);
                }, 100);
            }

            checkAnswer(btn) {
                clearInterval(this.timer);
                const q = this.questions[this.qIndex];
                const isCorrect = parseInt(btn.dataset.realIdx) === q.answer;

                this.questionsAttempted++;
                this.qCountDisplay.textContent = this.questionsAttempted;

                if(isCorrect) {
                    SFX.play(800, 'sine', 0.2);
                    btn.style.background = '#22c55e';
                    this.score += 100;
                    this.scoreDisplay.textContent = this.score;
                    setTimeout(() => { this.qIndex++; this.nextQuestion(); }, 500);
                } else {
                    this.handleWrong(btn);
                }
            }

            handleWrong(btn) {
                SFX.play(100, 'square', 0.4);
                if(btn) btn.style.background = '#ef4444';
                
                // Jika Mode Eliminasi, salah langsung tamat
                if (selectedRuleMode === 'elim') {
                    this.endGame();
                    return;
                }

                setTimeout(() => { this.qIndex++; this.nextQuestion(); }, 700);
            }

            endGame() {
                this.isAlive = false;
                clearInterval(this.timer);
                this.goScoreDisplay.textContent = this.score;
                this.gameOverScreen.classList.add('active');
            }
        }

        function initGame(num) {
            document.getElementById('main-menu').style.display = 'none';
            const gc = document.getElementById('game-container');
            gc.style.display = 'grid';
            gc.className = num === 1 ? 'mode-solo' : num === 2 ? 'mode-duel' : 'mode-squad';
            gc.innerHTML = '';
            for(let i=1; i<=num; i++) new Player(i, gc);
        }
    </script>
</body>
</html>
