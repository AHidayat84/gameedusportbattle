<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduSport Battle</title>
    <!-- Font Catchy -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --p1: #3b82f6; --p2: #ef4444; --p3: #f59e0b; --p4: #a855f7;
            --font-main: 'Outfit', sans-serif;
            --font-title: 'Bangers', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; }
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ================= NAVIGATION & MENUS ================= */
        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 12px; }
        .icon-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 50%; width: 45px; height: 45px; 
            color: white; cursor: pointer; backdrop-filter: blur(10px); 
            transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; font-size: 1.2rem; text-decoration: none; 
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .icon-btn.active { background: var(--primary); border-color: #fff; }

        #main-menu {
            position: fixed; inset: 0; z-index: 900;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-y: auto; padding: 40px 20px;
        }

        .menu-card { 
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
            max-width: 500px; width: 100%; position: relative;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= DEKORASI FOTO KREATOR ================= */
        .creator-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .creator-glow {
            position: absolute;
            inset: -5px;
            background: conic-gradient(from 0deg, var(--secondary), var(--primary), var(--accent), var(--secondary));
            border-radius: 50%;
            animation: rotateGlow 4s linear infinite;
            filter: blur(8px);
            opacity: 0.6;
        }
        @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .creator-container {
            width: 85px; height: 85px; position: relative; padding: 3px;
            background: #0f172a; border-radius: 50%; z-index: 2; overflow: hidden;
        }
        .creator-img {
            width: 100%; height: 100%; border-radius: 50%; display: block;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.2); background: #1e293b;
        }

        /* ================= HEADER SECTION (JUDUL + LOGO) ================= */
        .header-section { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .side-image {
            width: 80px; height: 80px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid var(--secondary); flex-shrink: 0;
        }
        .side-image img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .title-group { text-align: left; }
        .game-title { 
            font-family: var(--font-title); font-size: 3rem; line-height: 0.9;
            letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(135deg, #fff 20%, var(--secondary) 50%, var(--primary) 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .title-sub { color: var(--accent); -webkit-text-fill-color: initial; }

        /* ================= TOMBOL & SELEKTOR ================= */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; width: 100%; }
        .menu-btn { 
            padding: 12px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; 
            transition: all 0.3s; font-size: 0.95rem; text-transform: uppercase;
        }
        .btn-primary { background: #fff; color: #000; }
        .mode-selector { display: flex; background: rgba(0,0,0,0.4); border-radius: 14px; padding: 5px; margin-bottom: 10px; }
        .mode-opt { flex: 1; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 900; color: #94a3b8; }
        .mode-opt.active { background: #fff; color: #000; }

        /* ================= FOOTER ================= */
        .footer-credits {
            margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.7rem; color: #94a3b8;
        }
        .social-link {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
            color: white; text-decoration: none; padding: 6px 15px;
            background: #FF0000; border-radius: 10px; font-size: 0.75rem; font-weight: 800;
        }

        /* ================= GAMEPLAY ================= */
        #game-container { position: fixed; inset: 0; display: none; width: 100%; height: 100%; }
        .player-area { position: relative; display: flex; flex-direction: column; overflow: hidden; background: #020617; border: 1px solid rgba(255,255,255,0.05); }
        .hud { padding: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 900; }
        .timer-track { height: 4px; background: rgba(255,255,255,0.1); width: 100%; }
        .timer-fill { height: 100%; background: #fff; width: 100%; }
        .game-content { flex: 1; display: flex; flex-direction: column; padding: 10px; justify-content: space-between; }
        .playground { flex: 1; display: flex; align-items: center; justify-content: center; }
        .ball { font-size: clamp(2rem, 10vh, 5rem); transition: 0.3s; }
        .question-card { background: rgba(255,255,255,0.07); border-radius: 16px; padding: 12px; backdrop-filter: blur(10px); }
        .q-text { font-size: clamp(0.9rem, 2.5vh, 1.2rem); font-weight: 800; text-align: center; margin-bottom: 10px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; color: white; cursor: pointer; }

        #game-container.mode-duel { grid-template-columns: 1fr 1fr; }
        #game-container.mode-squad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        @media (max-width: 600px) {
            #game-container.mode-duel { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            #game-container.mode-squad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
            .game-title { font-size: 2.2rem; }
            .side-image { width: 60px; height: 60px; }
        }
    </style>
</head>

        // Logika Fullscreen
        const fsBtn = document.getElementById('fullscreen-btn');
        fsBtn.addEventListener('click', () => {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const exitFS = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFS) requestFS.call(docEl);
            } else {
                if (exitFS) exitFS.call(doc);
            }
        });

        document.addEventListener('fullscreenchange', updateFsIcon);
        document.addEventListener('webkitfullscreenchange', updateFsIcon);
        document.addEventListener('mozfullscreenchange', updateFsIcon);
        document.addEventListener('MSFullscreenChange', updateFsIcon);

        function updateFsIcon() {
            const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

        let selectedRuleMode = 'score';
        let audioEnabled = false;

        function setRules(mode) {
            selectedRuleMode = mode;
            document.getElementById('m-score').classList.toggle('active', mode === 'score');
            document.getElementById('m-elim').classList.toggle('active', mode === 'elim');
        }

        const SFX = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(f, t, d) {
                if(!audioEnabled || !this.ctx) return;
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            }
        };

        document.getElementById('audio-toggle').onclick = (e) => {
            audioEnabled = !audioEnabled;
            e.target.textContent = audioEnabled ? '🔊' : '🔈';
            SFX.init();
        };

        class Player {
            constructor(id, container) {
                this.id = id;
                this.score = 0;
                this.timer = null;
                this.el = document.createElement('div');
                this.el.className = 'player-area';
                this.el.innerHTML = `
                    <div class="hud"><span>P${id}</span> <span class="score-val">0</span></div>
                    <div class="timer-track"><div class="timer-fill"></div></div>
                    <div class="game-content">
                        <div class="playground"><div class="ball">⚽</div></div>
                        <div class="question-card">
                            <div class="q-text">...</div>
                            <div class="options-grid">
                                ${[0,1,2,3].map(i => `<button class="option-btn" data-idx="${i}"></button>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(this.el);
                this.btns = this.el.querySelectorAll('.option-btn');
                this.btns.forEach(b => b.onclick = () => this.checkAnswer(b));
                this.nextQuestion();
            }

            nextQuestion() {
                const q = questionBank[Math.floor(Math.random()*questionBank.length)];
                this.currentQ = q;
                this.el.querySelector('.q-text').textContent = q.q;
                this.el.querySelector('.ball').textContent = q.theme;
                this.btns.forEach((b, i) => {
                    b.textContent = q.options[i];
                    b.style.background = 'rgba(255,255,255,0.05)';
                });
                this.resetTimer();
            }

            resetTimer() {
                clearInterval(this.timer);
                let timeLeft = 10;
                this.timer = setInterval(() => {
                    timeLeft -= 0.1;
                    this.el.querySelector('.timer-fill').style.width = (timeLeft * 10) + '%';
                    if(timeLeft <= 0) this.nextQuestion();
                }, 100);
            }

            checkAnswer(btn) {
                const isCorrect = parseInt(btn.dataset.idx) === this.currentQ.answer;
                if(isCorrect) {
                    SFX.play(600, 'sine', 0.2);
                    this.score += 100;
                    this.el.querySelector('.score-val').textContent = this.score;
                    btn.style.background = 'var(--primary)';
                } else {
                    SFX.play(150, 'square', 0.3);
                    btn.style.background = 'var(--danger)';
                }
                setTimeout(() => this.nextQuestion(), 400);
            }
        }

        function initGame(num) {
            SFX.init();
            document.getElementById('main-menu').style.display = 'none';
            const gc = document.getElementById('game-container');
            gc.style.display = 'grid';
            gc.className = num === 1 ? 'mode-solo' : num === 2 ? 'mode-duel' : 'mode-squad';
            for(let i=1; i<=num; i++) new Player(i, gc);
        }
    </script>
