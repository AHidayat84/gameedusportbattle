<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduSport Battle - PJOK SMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --p1: #00f2ff;
            --p2: #ff0055;
            --p3: #f59e0b;
            --p4: #a855f7;
            --font-main: 'Outfit', sans-serif;
            --font-tech: 'Orbitron', sans-serif;
            --font-title: 'Bangers', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(45deg, #020617, #0f172a);
            overflow: hidden;
        }
        .bg-glow::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Top Bar */
        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
        .icon-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 12px; width: 45px; height: 45px; 
            color: var(--neon-blue); cursor: pointer; backdrop-filter: blur(10px); 
            transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }
        .icon-btn:hover { background: rgba(0, 242, 255, 0.15); transform: translateY(-2px); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        /* Main Menu */
        #main-menu {
            position: fixed; inset: 0; z-index: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        .menu-card { 
            background: rgba(15, 23, 42, 0.6); 
            padding: 50px; border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; backdrop-filter: blur(30px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(59, 130, 246, 0.1);
            max-width: 550px; width: 100%; position: relative;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .profile-section { position: relative; margin-bottom: 25px; }
        .profile-avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            object-fit: cover;
            padding: 5px; background: rgba(0,0,0,0.3);
        }

        .title-container {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; margin-bottom: 35px;
        }
        .left-img {
            width: 80px; height: 80px; object-fit: contain;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        .game-title { 
            font-family: var(--font-title); font-size: 4.5rem; line-height: 0.85; text-align: left;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .menu-btn { 
            padding: 18px; border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; 
            font-weight: 800; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; font-size: 1rem; letter-spacing: 1px;
            color: white; background: rgba(255,255,255,0.03);
            position: relative; overflow: hidden;
            font-family: var(--font-tech);
        }
        .menu-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .menu-btn:hover::before { left: 100%; }
        .menu-btn:hover { transform: scale(1.02); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }

        .btn-primary { background: var(--neon-blue); color: #020617; border: none; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .btn-primary:hover { background: #fff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.6); }

        .mode-selector { display: flex; background: rgba(0,0,0,0.5); border-radius: 18px; padding: 6px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .mode-opt { 
            flex: 1; padding: 12px; border-radius: 14px; cursor: pointer; font-size: 0.8rem; 
            font-weight: 900; color: #64748b; font-family: var(--font-tech); transition: 0.3s;
        }
        .mode-opt.active { background: rgba(255,255,255,0.1); color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* Social Link Styling */
        .social-link {
            text-decoration: none;
            color: var(--p2);
            transition: 0.3s;
            display: inline-block;
            margin-top: 5px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.3);
        }
        .social-link:hover {
            color: #fff;
            text-shadow: 0 0 15px var(--p2);
            transform: translateY(-1px);
        }

        /* Game UI */
        #game-container { position: fixed; inset: 0; display: none; width: 100%; height: 100%; background: #000; }
        
        .player-area { 
            position: relative; display: flex; flex-direction: column; overflow: hidden; 
            background: #020617; border: 1px solid rgba(255,255,255,0.05); 
        }
        .player-area::before {
            content: ''; position: absolute; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; pointer-events: none;
        }
        
        /* HUD Decorations */
        .hud-corner { position: absolute; width: 40px; height: 40px; border: 2px solid rgba(0, 242, 255, 0.2); pointer-events: none; }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        .hud { 
            padding: 15px; display: flex; flex-direction: column; gap: 5px; 
            background: linear-gradient(to bottom, rgba(15,23,42,0.9), transparent); 
            z-index: 10;
        }
        .p-label { font-family: var(--font-tech); font-size: 0.9rem; letter-spacing: 2px; }
        
        .timer-track { height: 4px; background: rgba(255,255,255,0.05); width: 100%; position: relative; }
        .timer-fill { height: 100%; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); width: 100%; transition: width 0.1s linear; }

        .game-content { flex: 1; display: flex; flex-direction: column; padding: 20px; justify-content: space-between; position: relative; z-index: 5; }
        
        .playground { 
            flex: 0.6; display: flex; align-items: center; justify-content: center; position: relative; 
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            border-radius: 30px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .subject-icon { font-size: 90px; filter: drop-shadow(0 0 25px rgba(0, 242, 255, 0.4)); }

        .question-card { 
            background: rgba(255,255,255,0.03); border-radius: 24px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .q-text { 
            font-size: clamp(0.8rem, 2vh, 1.1rem); font-weight: 700; text-align: center; 
            margin-bottom: 15px; min-height: 4em; display: flex; align-items: center; 
            justify-content: center; line-height: 1.4; color: #e2e8f0;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn { 
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px; border-radius: 14px; color: #94a3b8; cursor: pointer; 
            font-size: 0.8rem; font-weight: 600; transition: 0.2s; min-height: 50px;
        }
        .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); color: #fff; }

        /* Results */
        #victory-screen {
            position: fixed; inset: 0; z-index: 2000; background: rgba(2, 6, 23, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
            backdrop-filter: blur(20px);
        }
        .victory-title { font-family: var(--font-tech); font-size: 3rem; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin-bottom: 30px; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(5deg); } }

        @media (max-width: 800px) {
            .menu-card { padding: 30px; }
            .game-title { font-size: 3rem; }
            .options-grid { grid-template-columns: 1fr; }
            .playground { flex: 0.4; }
        }
    </style>
</head>

            { q: "Kebersihan lingkungan sekolah adalah tanggung jawab?", options: ["Guru saja", "Murid saja", "Kepala sekolah saja", "Warga sekolah"], answer: 3 }
        ];

        let selectedRuleMode = 'score';
        let audioEnabled = false;
        let gameActive = true;
        let players = [];
        const SCORE_MODE_MAX = 15;

        const getSubjectMeta = (qText) => {
            const lowQ = qText.toLowerCase();
            if (lowQ.includes("tenis meja") || lowQ.includes("ping pong")) return { icon: "🏓", ball: "⚪", color: "#10b981" };
            if (lowQ.includes("bulu tangkis") || lowQ.includes("raket")) return { icon: "🏸", ball: "🏸", color: "#34d399" };
            if (lowQ.includes("pencak silat") || lowQ.includes("bela diri")) return { icon: "🥋", ball: "👊", color: "#ef4444" };
            if (lowQ.includes("renang") || lowQ.includes("kolam")) return { icon: "🏊", ball: "🌊", color: "#3b82f6" };
            if (lowQ.includes("voli") || lowQ.includes("smash")) return { icon: "🏐", ball: "🏐", color: "#f59e0b" };
            if (lowQ.includes("sepak bola") || lowQ.includes("gol")) return { icon: "⚽", ball: "⚽", color: "#22c55e" };
            if (lowQ.includes("basket") || lowQ.includes("dribble")) return { icon: "🏀", ball: "🏀", color: "#ea580c" };
            if (lowQ.includes("atletik") || lowQ.includes("lari")) return { icon: "🏃", ball: "👟", color: "#8b5cf6" };
            if (lowQ.includes("kebugaran") || lowQ.includes("push up")) return { icon: "💪", ball: "🏋️", color: "#64748b" };
            if (lowQ.includes("senam") || lowQ.includes("lantai")) return { icon: "🤸", ball: "⭕", color: "#f472b6" };
            if (lowQ.includes("kesehatan") || lowQ.includes("narkoba")) return { icon: "🏥", ball: "🍎", color: "#ec4899" };
            return { icon: "💎", ball: "✨", color: "#00f2ff" };
        };

        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playSFX(freq, type, duration) {
                if (!audioEnabled || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            }
        };

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function setRules(mode) {
            selectedRuleMode = mode;
            document.getElementById('m-score').classList.toggle('active', mode === 'score');
            document.getElementById('m-elim').classList.toggle('active', mode === 'elim');
        }

        document.getElementById('audio-toggle').onclick = (e) => {
            audioEnabled = !audioEnabled;
            e.currentTarget.textContent = audioEnabled ? '🔊' : '🔈';
            AudioEngine.init();
        };

        class Player {
            constructor(id, container) {
                this.id = id;
                this.score = 0;
                this.lives = 3;
                this.questionsCount = 0;
                this.isDone = false;
                this.isEliminated = false;
                this.timer = null;
                this.questionQueue = [];
                this.refreshQueue();

                this.el = document.createElement('div');
                this.el.className = 'player-area';
                container.appendChild(this.el);
                this.nextQuestion();
            }

            refreshQueue() {
                this.questionQueue = Array.from({length: questionBank.length}, (_, i) => i).sort(() => Math.random() - 0.5);
            }

            updateUI(meta = null) {
                const statText = selectedRuleMode === 'score' ? 
                    `TASK PROGRESS: ${this.questionsCount}/${SCORE_MODE_MAX}` : 
                    `INTEGRITY: ${'❤️'.repeat(this.lives)}`;

                this.el.innerHTML = `
                    <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
                    <div class="hud-corner bl"></div><div class="hud-corner br"></div>
                    <div class="hud">
                        <div class="p-label" style="color:var(--p${this.id})">PLAYER_UNIT_0${this.id}</div>
                        <div style="font-size:0.7rem; color:rgba(255,255,255,0.5); font-family:var(--font-tech)">${statText}</div>
                    </div>
                    <div class="timer-track"><div class="timer-fill" style="background:var(--p${this.id}); box-shadow: 0 0 10px var(--p${this.id})"></div></div>
                    <div class="game-content">
                        <div class="playground" style="background: radial-gradient(circle, ${meta?.color || '#00f2ff'}15 0%, transparent 70%)">
                            <div class="subject-icon floating">${meta?.icon || "💎"}</div>
                        </div>
                        <div class="question-card">
                            <div class="q-text">CONNECTING TO DATABASE...</div>
                            <div class="options-grid">
                                ${[0,1,2,3].map(i => `<button class="option-btn" onclick="players[${this.id-1}].checkAnswer(${i})"></button>`).join('')}
                            </div>
                        </div>
                        <div style="text-align:right; font-family:var(--font-tech); color:var(--p${this.id}); padding: 5px; font-size:1rem; letter-spacing:2px">SCORE: ${this.score}</div>
                    </div>
                `;
            }

            nextQuestion() {
                if (!gameActive || this.isDone || this.isEliminated) return;
                
                if (selectedRuleMode === 'score' && this.questionsCount >= SCORE_MODE_MAX) {
                    this.finish();
                    return;
                }

                if (this.questionQueue.length === 0) this.refreshQueue();
                this.currentIdx = this.questionQueue.pop();
                const q = questionBank[this.currentIdx];
                const meta = getSubjectMeta(q.q);
                
                this.updateUI(meta);
                this.el.querySelector('.q-text').textContent = q.q;
                const btns = this.el.querySelectorAll('.option-btn');
                btns.forEach((b, i) => {
                    b.textContent = q.options[i];
                    b.disabled = false;
                });

                this.startTimer();
            }

            startTimer() {
                if (this.timer) clearInterval(this.timer);
                let timeLeft = 12;
                const fill = this.el.querySelector('.timer-fill');
                this.timer = setInterval(() => {
                    if (!gameActive) { clearInterval(this.timer); return; }
                    timeLeft -= 0.1;
                    if (fill) fill.style.width = (timeLeft / 12 * 100) + '%';
                    if (timeLeft <= 0) {
                        clearInterval(this.timer);
                        this.handleResult(false);
                    }
                }, 100);
            }

            checkAnswer(idx) {
                if (!gameActive || this.isDone || this.isEliminated) return;
                clearInterval(this.timer);
                const isCorrect = idx === questionBank[this.currentIdx].answer;
                this.handleResult(isCorrect, idx);
            }

            handleResult(isCorrect, btnIdx = null) {
                const btns = this.el.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                
                if (isCorrect) {
                    AudioEngine.playSFX(800, 'sine', 0.1);
                    if (btnIdx !== null) {
                        btns[btnIdx].style.background = 'rgba(34, 197, 94, 0.2)';
                        btns[btnIdx].style.borderColor = 'var(--primary)';
                        btns[btnIdx].style.color = '#fff';
                    }
                    this.score += 100;
                } else {
                    AudioEngine.playSFX(100, 'sawtooth', 0.3);
                    this.el.querySelector('.question-card').classList.add('shake');
                    if (btnIdx !== null) {
                        btns[btnIdx].style.background = 'rgba(239, 68, 68, 0.2)';
                        btns[btnIdx].style.borderColor = 'var(--danger)';
                    }
                    btns[questionBank[this.currentIdx].answer].style.borderColor = 'var(--primary)';
                    btns[questionBank[this.currentIdx].answer].style.color = 'var(--primary)';
                    if (selectedRuleMode === 'elim' && this.lives > 0) this.lives--;
                }

                this.questionsCount++;

                setTimeout(() => {
                    if (selectedRuleMode === 'elim' && this.lives <= 0) {
                        this.isEliminated = true;
                        this.el.classList.add('eliminated');
                    }
                    this.nextQuestion();
                    checkGlobalEnd();
                }, 1000);
            }

            finish() {
                this.isDone = true;
                this.el.classList.add('eliminated');
                const qText = this.el.querySelector('.q-text');
                if (qText) qText.innerHTML = "<span style='color:var(--neon-blue)'>PROTOCOL COMPLETED</span>";
                checkGlobalEnd();
            }
        }

        function initGame(num) {
            AudioEngine.init();
            gameActive = true;
            document.getElementById('main-menu').style.display = 'none';
            const gc = document.getElementById('game-container');
            gc.style.display = 'grid';
            gc.innerHTML = '';
            
            if(num === 1) gc.style.gridTemplateColumns = '1fr';
            else if(num === 2) gc.style.gridTemplateColumns = '1fr 1fr';
            else gc.style.gridTemplateColumns = '1fr 1fr';

            players = [];
            for(let i=1; i<=num; i++) players.push(new Player(i, gc));
        }

        function checkGlobalEnd() {
            const finished = players.every(p => p.isDone || p.isEliminated);
            if (finished && players.length > 0) endGame();
        }

        function endGame() {
            gameActive = false;
            const screen = document.getElementById('victory-screen');
            const board = document.getElementById('scoreboard-results');
            screen.style.display = 'flex';
            board.innerHTML = '';

            const sorted = [...players].sort((a, b) => b.score - a.score);
            sorted.forEach((p, i) => {
                const row = document.createElement('div');
                row.style.cssText = `display:flex; justify-content:space-between; padding:18px; margin-bottom:12px; background:rgba(255,255,255,0.03); border-radius:15px; border-left:4px solid var(--p${p.id}); align-items:center; border:1px solid rgba(255,255,255,0.05);`;
                row.innerHTML = `<span style="font-family:var(--font-tech); font-size:0.9rem">#${i+1} UNIT_${p.id}</span><strong style="font-size:1.5rem; color:var(--neon-blue)">${p.score}</strong>`;
                board.appendChild(row);
            });
        }
